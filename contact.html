<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="photography.html">Photography</a>
        <a href="design.html">Design</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main>
        <h1>Get In Touch</h1>
        
        <div class="grid" style="max-width: 800px; margin: auto;">
            <div class="card">
                <img src="about1.jpeg" onclick="openModal(this.src)" alt="Office Space">
                <p>Volunteering at a Senior center.</p>
            </div>
            <div class="card">
                <img src="about2.png" onclick="openModal(this.src)" alt="Working">
                <p>Reflecting on my new masterpiece.</p>
            </div>
        </div>

        <section class="contact-section">
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="How can I help you?" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </section>
    </main>

    <div id="myModal" class="modal" onclick="this.style.display='none'">
        <span class="close">&times;</span>
        <img class="modal-content" id="img01">
    </div>

    <script src="script.js"></script>
</body>
</html>
